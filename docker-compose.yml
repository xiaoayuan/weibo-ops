services:
  db:
    image: postgres:16-alpine
    container_name: weibo-ops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weibo_ops}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weibo-ops-app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@db:5432/weibo_ops?schema=public}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      ACCOUNT_SECRET_KEY: ${ACCOUNT_SECRET_KEY:-replace_with_a_32_plus_char_secret}
      EXECUTOR_MODE: ${EXECUTOR_MODE:-weibo}
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${APP_PORT:-3007}:3000"

volumes:
  postgres_data:
