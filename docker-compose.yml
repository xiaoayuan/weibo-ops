services:
  db:
    image: postgres:16-alpine
    container_name: weibo-ops-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-weibo_ops}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weibo_ops}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "23.19.228.3:5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weibo-ops-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      ACCOUNT_SECRET_KEY: ${ACCOUNT_SECRET_KEY:?ACCOUNT_SECRET_KEY is required}
      EXECUTOR_MODE: ${EXECUTOR_MODE:-weibo}
      NODE_ROLE: ${NODE_ROLE:-controller}
      NODE_ID: ${NODE_ID:-main-1}
      ACTION_JOB_NODES: ${ACTION_JOB_NODES:-main-1:主服务器}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${APP_PORT:-3007}:3000"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        BACKEND_ORIGIN: http://api:3009
    container_name: weibo-ops-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3008"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3008
      BACKEND_ORIGIN: http://api:3009
    ports:
      - "${WEB_APP_PORT:-3008}:3008"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: weibo-ops-api
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3009"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3009
      LEGACY_BACKEND_ORIGIN: http://app:3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      ACCOUNT_SECRET_KEY: ${ACCOUNT_SECRET_KEY:?ACCOUNT_SECRET_KEY is required}
      NODE_ROLE: ${NODE_ROLE:-controller}
      NODE_ID: ${NODE_ID:-main-1}
      ACTION_JOB_NODES: ${ACTION_JOB_NODES:-main-1:主服务器}
    ports:
      - "${API_APP_PORT:-3009}:3009"

volumes:
  postgres_data:
