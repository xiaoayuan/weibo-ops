services:
  db:
    image: postgres:16-alpine
    container_name: weibo-ops-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-weibo_ops}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weibo_ops}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weibo-ops-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@db:5432/weibo_ops?schema=public}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      ACCOUNT_SECRET_KEY: ${ACCOUNT_SECRET_KEY:-replace_with_a_32_plus_char_secret}
      EXECUTOR_MODE: ${EXECUTOR_MODE:-weibo}
      NODE_ROLE: ${NODE_ROLE:-controller}
      NODE_ID: ${NODE_ID:-main-1}
      ACTION_JOB_NODES: ${ACTION_JOB_NODES:-main-1:主服务器}
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "${APP_PORT:-3007}:3000"

volumes:
  postgres_data:
